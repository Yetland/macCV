name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build.sh release

      - name: Package app
        run: ditto -c -k --keepParent build/MacCV.app MacCV.app.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: MacCV.app.zip
          generate_release_notes: true
